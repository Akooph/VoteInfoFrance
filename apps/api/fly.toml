app = "voteinfofrance-api"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[http_service.concurrency]
  type = "requests"
  hard_limit = 25   # shed load rather than OOM on 512 MB
  soft_limit = 15

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
