name: Deploy Landing Page to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web/app/(landing)/**'
      - 'apps/web/public/**'
      - 'apps/web/app/globals.css'
      - 'apps/web/next.config.ts'

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy Landing
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # Cache node_modules keyed by lockfile — skips install (and the 3-min
      # supply-chain check) when no dependency has changed.
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/web/node_modules
            packages/types/node_modules
            packages/ui/node_modules
            packages/config/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      # Cache the Next.js webpack/swc build cache across runs.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/web/out-landing/cache
          key: ${{ runner.os }}-nextjs-landing-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/**.[jt]s', 'apps/web/**.[jt]sx', 'packages/**.[jt]s') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-landing-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-landing-

      - name: Build shared packages
        run: pnpm --filter @vif/types build && pnpm --filter @vif/ui build

      - name: Build landing page (static export)
        run: pnpm --filter @vif/web build:landing
        env:
          NEXT_LANDING_ONLY: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/out-landing
          force_orphan: true
