name: Deploy Landing Page to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/app/(landing)/**'
      - 'apps/web/public/**'
      - 'apps/web/app/globals.css'
      - 'apps/web/next.config.ts'

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy Landing
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @vif/types build && pnpm --filter @vif/ui build

      - name: Build landing page (static export)
        run: pnpm --filter @vif/web build:landing
        env:
          NEXT_LANDING_ONLY: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/out-landing
          force_orphan: true
