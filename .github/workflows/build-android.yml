name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/types/**'

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @vif/mobile...

      - name: Generate Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Build APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease

      - name: Publish GitHub Release
        run: |
          gh release delete android-latest --yes 2>/dev/null || true
          gh release create android-latest \
            --title "Android APK (dernière version)" \
            --notes "Dernière version de l'application Android. Téléchargez et installez sur votre appareil (sources inconnues requises)." \
            --prerelease \
            apps/mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk#voteinfofrance.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
