name: Ingest Propositions

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  ingest:
    name: Trigger all sources
    runs-on: ubuntu-latest
    steps:
      - name: Assemblée Nationale
        run: |
          curl -sf -X POST "${{ secrets.NEXT_PUBLIC_API_URL }}/admin/ingestion/trigger?source=assemblee_nationale" \
            -H "x-admin-api-key: ${{ secrets.ADMIN_API_KEY }}" || echo "assemblee_nationale failed"

      - name: Sénat
        run: |
          curl -sf -X POST "${{ secrets.NEXT_PUBLIC_API_URL }}/admin/ingestion/trigger?source=senat" \
            -H "x-admin-api-key: ${{ secrets.ADMIN_API_KEY }}" || echo "senat failed"

      - name: Parlement Européen
        run: |
          curl -sf -X POST "${{ secrets.NEXT_PUBLIC_API_URL }}/admin/ingestion/trigger?source=parlement_europeen" \
            -H "x-admin-api-key: ${{ secrets.ADMIN_API_KEY }}" || echo "parlement_europeen failed"
