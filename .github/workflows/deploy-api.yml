name: Deploy API to Fly.io

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/types/**'
      - 'packages/config/**'

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set API secrets on Fly.io
        # Stage secrets so they're applied atomically with the new deployment
        # (avoids a double restart). Add any new required vars here and as
        # GitHub repository secrets.
        run: |
          flyctl secrets set \
            SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            SUPABASE_JWT_SECRET="${{ secrets.SUPABASE_JWT_SECRET }}" \
            MISTRAL_API_KEY="${{ secrets.MISTRAL_API_KEY }}" \
            ADMIN_API_KEY="${{ secrets.ADMIN_API_KEY }}" \
            REDIS_HOST="${{ secrets.REDIS_HOST }}" \
            REDIS_PORT="${{ secrets.REDIS_PORT }}" \
            REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
            --app voteinfofrance-api --stage
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        # Run from repo root so the Docker build context includes the full
        # monorepo (packages/types, packages/config, pnpm-workspace.yaml, etc.)
        run: flyctl deploy --remote-only --app voteinfofrance-api --config apps/api/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
