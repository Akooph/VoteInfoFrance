name: Deploy API to Fly.io

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/types/**'
      - 'packages/config/**'

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        # Run from repo root so the Docker build context includes the full
        # monorepo (packages/types, packages/config, pnpm-workspace.yaml, etc.)
        run: flyctl deploy --remote-only --app voteinfofrance-api --config apps/api/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
